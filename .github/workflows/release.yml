name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: windows-exe
            asset_name: Claude-Usage-Dashboard-Windows.exe
            build_ext: dist/Claude-Usage-Dashboard.exe
          - os: macos-latest
            artifact: macos-app
            asset_name: Claude-Usage-Dashboard-macOS
            build_ext: dist/Claude-Usage-Dashboard
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Build
        run: python build.py
      
      - name: Rename asset
        shell: bash
        run: |
          if [ -f "${{ matrix.build_ext }}" ]; then
            cp "${{ matrix.build_ext }}" "${{ matrix.asset_name }}"
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.asset_name }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      
      - name: List assets
        run: ls -la dist/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Claude-Usage-Dashboard-Windows.exe
            dist/Claude-Usage-Dashboard-macOS
          generate_release_notes: true
