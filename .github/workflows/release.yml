name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: windows-exe
            asset_name: Claude-Usage-Dashboard-Windows.exe
            build_ext: dist/Claude-Usage-Dashboard.exe
          - os: macos-latest
            artifact: macos-app
            asset_name: Claude-Usage-Dashboard-macOS
            build_ext: dist/Claude-Usage-Dashboard
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout source (private repo)
        uses: actions/checkout@v4
        with:
          repository: 2ndlifeinc/claude-usage-dashboard
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Build
        run: python build.py
      
      - name: Rename asset
        shell: bash
        run: cp "${{ matrix.build_ext }}" "${{ matrix.asset_name }}"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.asset_name }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: |
            dist/Claude-Usage-Dashboard-Windows.exe
            dist/Claude-Usage-Dashboard-macOS
          generate_release_notes: false
          body: |
            ## Claude Usage Dashboard ${{ github.event.inputs.tag }}
            
            ### Downloads
            - **Windows**: `Claude-Usage-Dashboard-Windows.exe`
            - **macOS**: `Claude-Usage-Dashboard-macOS`
            
            ### How to use
            1. Download for your OS
            2. Run the app (Chrome must be installed with Claude logged in)
            3. Dashboard opens at http://localhost:18080
