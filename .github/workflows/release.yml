name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows-exe
            asset_name: Claude-Usage-Dashboard-Windows.exe
            build_ext: dist/Claude-Usage-Dashboard.exe
          - os: macos-latest
            artifact: macos-app
            asset_name: Claude-Usage-Dashboard-macOS
            build_ext: dist/Claude-Usage-Dashboard
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout source (private repo)
        uses: actions/checkout@v4
        with:
          repository: 2ndlifeinc/claude-usage-dashboard
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      
      - name: Test imports
        run: python -c "from app.main import app; from app.chrome import scan_all_profiles; from app.claude_api import fetch_all_usage; print('All imports OK')"
      
      - name: E2E test (source)
        shell: bash
        run: |
          export CLAUDE_DASHBOARD_PORT=18099
          export CLAUDE_DASHBOARD_NO_TRAY=1
          export CLAUDE_DASHBOARD_NO_BROWSER=1
          TMPLOG="${RUNNER_TEMP:-/tmp}"
          
          python run.py > "$TMPLOG/src_stdout.log" 2> "$TMPLOG/src_stderr.log" &
          APP_PID=$!
          
          STARTED=0
          for i in $(seq 1 30); do
            if curl -s http://localhost:18099/api/config > /dev/null 2>&1; then
              echo "Server started after ${i}s"
              STARTED=1
              break
            fi
            sleep 1
          done
          
          if [ "$STARTED" = "0" ]; then
            echo "::error::Source server failed to start"
            cat "$TMPLOG/src_stderr.log"
            kill $APP_PID 2>/dev/null || true
            exit 1
          fi
          
          # Test index returns 200 with HTML
          HTTP_CODE=$(curl -s -o "$TMPLOG/index.html" -w "%{http_code}" http://localhost:18099/)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Index returned HTTP $HTTP_CODE"
            cat "$TMPLOG/src_stderr.log"
            kill $APP_PID 2>/dev/null || true
            exit 1
          fi
          grep -q "<html" "$TMPLOG/index.html" || { echo "::error::Index response is not HTML"; exit 1; }
          echo "✅ Index OK (HTTP $HTTP_CODE)"
          
          # Test /api/usage returns JSON array
          curl -sf http://localhost:18099/api/usage | python -c "import json,sys; d=json.load(sys.stdin); print(f'✅ Usage OK ({len(d)} accounts)'); assert isinstance(d, list)"
          
          # Test /api/config returns valid config
          curl -sf http://localhost:18099/api/config | python -c "import json,sys; d=json.load(sys.stdin); print(f'✅ Config OK: {d}'); assert 'refresh_interval' in d"
          
          echo "=== Source e2e passed ==="
          kill $APP_PID 2>/dev/null || true
      
      - name: Build
        run: python build.py
      
      - name: E2E test (binary)
        shell: bash
        run: |
          BINARY="${{ matrix.build_ext }}"
          if [ ! -f "$BINARY" ]; then
            echo "::error::Binary not found: $BINARY"
            exit 1
          fi
          
          export CLAUDE_DASHBOARD_PORT=18098
          export CLAUDE_DASHBOARD_NO_TRAY=1
          export CLAUDE_DASHBOARD_NO_BROWSER=1
          TMPLOG="${RUNNER_TEMP:-/tmp}"
          
          chmod +x "$BINARY" 2>/dev/null || true
          "$BINARY" > "$TMPLOG/bin_stdout.log" 2> "$TMPLOG/bin_stderr.log" &
          BIN_PID=$!
          
          STARTED=0
          for i in $(seq 1 60); do
            if curl -s http://localhost:18098/api/config > /dev/null 2>&1; then
              echo "Binary started after ${i}s"
              STARTED=1
              break
            fi
            sleep 1
          done
          
          if [ "$STARTED" = "0" ]; then
            echo "::error::Binary failed to start"
            echo "=== stderr ==="
            cat "$TMPLOG/bin_stderr.log"
            echo "=== stdout ==="
            cat "$TMPLOG/bin_stdout.log"
            kill $BIN_PID 2>/dev/null || true
            exit 1
          fi
          
          # Test index
          HTTP_CODE=$(curl -s -o "$TMPLOG/bin_index.html" -w "%{http_code}" http://localhost:18098/)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Binary index returned HTTP $HTTP_CODE"
            cat "$TMPLOG/bin_stderr.log"
            kill $BIN_PID 2>/dev/null || true
            exit 1
          fi
          grep -q "<html" "$TMPLOG/bin_index.html" || { echo "::error::Binary index is not HTML"; exit 1; }
          echo "✅ Binary index OK"
          
          # Test /api/usage
          curl -sf http://localhost:18098/api/usage | python -c "import json,sys; d=json.load(sys.stdin); print(f'✅ Binary usage OK ({len(d)} accounts)'); assert isinstance(d, list)"
          
          # Test /api/config
          curl -sf http://localhost:18098/api/config | python -c "import json,sys; d=json.load(sys.stdin); print(f'✅ Binary config OK: {d}'); assert 'refresh_interval' in d"
          
          echo "=== Binary e2e passed ==="
          kill $BIN_PID 2>/dev/null || true
      
      - name: Rename asset
        shell: bash
        run: cp "${{ matrix.build_ext }}" "${{ matrix.asset_name }}"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.asset_name }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: |
            dist/Claude-Usage-Dashboard-Windows.exe
            dist/Claude-Usage-Dashboard-macOS
          generate_release_notes: false
          body: |
            ## Claude Usage Dashboard ${{ github.event.inputs.tag }}
            
            ### Downloads
            - **Windows**: `Claude-Usage-Dashboard-Windows.exe`
            - **macOS**: `Claude-Usage-Dashboard-macOS`
            
            ### How to use
            1. Download for your OS
            2. Run the app (Chrome must be installed with Claude logged in)
            3. Dashboard opens at http://localhost:18080
