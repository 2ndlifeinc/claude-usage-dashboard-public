<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Usage Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .bar-bg { background: #334155; border-radius: 4px; height: 8px; }
        .bar-fill { border-radius: 4px; height: 8px; transition: width 0.5s ease; }
        .bar-green { background: linear-gradient(90deg, #22c55e, #4ade80); }
        .bar-yellow { background: linear-gradient(90deg, #eab308, #facc15); }
        .bar-red { background: linear-gradient(90deg, #ef4444, #f87171); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen p-6">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold text-white">Claude Usage Dashboard</h1>
                <p class="text-sm text-slate-400 mt-1">
                    <span id="account-count">-</span> accounts · 
                    Last updated: <span id="last-updated">-</span>
                </p>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 text-sm text-slate-400">
                    <label for="refresh-interval">Refresh:</label>
                    <input type="number" id="refresh-interval" min="5" max="3600" value="60"
                           class="w-20 bg-slate-700 border border-slate-600 rounded px-2 py-1 text-white text-center">
                    <span>sec</span>
                </div>
                <button onclick="refreshNow()" 
                        class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium transition">
                    ↻ Refresh
                </button>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="text-center py-20">
            <div class="inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-slate-400">Scanning Chrome profiles...</p>
        </div>

        <!-- Error -->
        <div id="error" class="hidden text-center py-20">
            <p class="text-red-400 text-lg">⚠️ <span id="error-msg"></span></p>
            <button onclick="refreshNow()" class="mt-4 px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">Retry</button>
        </div>

        <!-- Cards Grid -->
        <div id="cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 hidden"></div>

        <!-- Summary Bar -->
        <div id="summary" class="hidden mt-6 card p-4">
            <div class="flex items-center justify-between text-sm text-slate-400">
                <span>Total weekly capacity across all accounts</span>
                <span id="summary-text">-</span>
            </div>
            <div class="bar-bg mt-2">
                <div id="summary-bar" class="bar-fill bar-green" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <script>
    let refreshTimer = null;
    let refreshInterval = 60;

    function barColor(pct) {
        if (pct >= 50) return 'bar-green';
        if (pct >= 20) return 'bar-yellow';
        return 'bar-red';
    }

    function formatReset(isoStr) {
        if (!isoStr) return '-';
        const reset = new Date(isoStr);
        const now = new Date();
        const diff = reset - now;
        if (diff <= 0) return 'now';
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        if (h > 24) return `${Math.floor(h/24)}d ${h%24}h`;
        if (h > 0) return `${h}h ${m}m`;
        return `${m}m`;
    }

    function makeUsageRow(label, data) {
        if (!data || data.remaining === null) return '';
        const pct = Math.max(0, Math.min(100, data.remaining));
        const color = barColor(pct);
        return `
            <div class="mb-3">
                <div class="flex justify-between text-xs mb-1">
                    <span class="text-slate-400">${label}</span>
                    <span class="${pct < 20 ? 'text-red-400 font-medium' : 'text-slate-300'}">${pct.toFixed(0)}% left · reset ${formatReset(data.resets_at)}</span>
                </div>
                <div class="bar-bg">
                    <div class="bar-fill ${color}" style="width: ${pct}%"></div>
                </div>
            </div>
        `;
    }

    function renderCards(data) {
        const container = document.getElementById('cards');
        container.innerHTML = '';

        data.forEach((acc, i) => {
            const hasError = acc.error;
            const card = document.createElement('div');
            card.className = 'card p-5 fade-in';
            card.style.animationDelay = `${i * 0.05}s`;

            if (hasError) {
                card.innerHTML = `
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 rounded-full bg-red-900/50 flex items-center justify-center text-red-400">✕</div>
                        <div>
                            <div class="font-medium text-white">${acc.profile_name || acc.profile}</div>
                            <div class="text-xs text-red-400">${acc.error}</div>
                        </div>
                    </div>
                `;
            } else {
                const initial = (acc.email || '?')[0].toUpperCase();
                const colors = ['bg-blue-600', 'bg-purple-600', 'bg-emerald-600', 'bg-amber-600', 'bg-rose-600', 'bg-cyan-600'];
                const bgColor = colors[i % colors.length];
                
                card.innerHTML = `
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 rounded-full ${bgColor} flex items-center justify-center text-white font-bold">${initial}</div>
                        <div class="min-w-0">
                            <div class="font-medium text-white truncate">${acc.email || 'Unknown'}</div>
                            <div class="text-xs text-slate-400">${acc.profile_name} · ${acc.profile}</div>
                        </div>
                    </div>
                    ${makeUsageRow('Session (5h)', acc.session)}
                    ${makeUsageRow('Weekly (7d)', acc.weekly)}
                    ${makeUsageRow('Opus', acc.opus)}
                    ${makeUsageRow('Sonnet', acc.sonnet)}
                `;
            }
            container.appendChild(card);
        });

        // Summary
        const valid = data.filter(a => !a.error && a.weekly);
        if (valid.length > 0) {
            const avgRemaining = valid.reduce((sum, a) => sum + a.weekly.remaining, 0) / valid.length;
            document.getElementById('summary-text').textContent = `${avgRemaining.toFixed(0)}% avg remaining`;
            document.getElementById('summary-bar').style.width = `${avgRemaining}%`;
            document.getElementById('summary-bar').className = `bar-fill ${barColor(avgRemaining)}`;
            document.getElementById('summary').classList.remove('hidden');
        }
    }

    async function fetchUsage() {
        try {
            const resp = await fetch('/api/usage');
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
            document.getElementById('cards').classList.remove('hidden');
            
            document.getElementById('account-count').textContent = data.length;
            document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
            
            renderCards(data);
        } catch (e) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('error-msg').textContent = e.message;
        }
    }

    function refreshNow() {
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('cards').classList.add('hidden');
        document.getElementById('error').classList.add('hidden');
        fetchUsage();
        resetTimer();
    }

    function resetTimer() {
        if (refreshTimer) clearInterval(refreshTimer);
        refreshTimer = setInterval(fetchUsage, refreshInterval * 1000);
    }

    // Refresh interval control
    const intervalInput = document.getElementById('refresh-interval');
    intervalInput.addEventListener('change', () => {
        refreshInterval = Math.max(5, Math.min(3600, parseInt(intervalInput.value) || 60));
        intervalInput.value = refreshInterval;
        resetTimer();
        // Save to server
        fetch('/api/config', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ refresh_interval: refreshInterval }),
        });
    });

    // Load config and start
    fetch('/api/config').then(r => r.json()).then(cfg => {
        refreshInterval = cfg.refresh_interval || 60;
        intervalInput.value = refreshInterval;
        fetchUsage();
        resetTimer();
    }).catch(() => {
        fetchUsage();
        resetTimer();
    });
    </script>
</body>
</html>
